# One-time use: obtains the first Let's Encrypt certificate before the
# real prod stack (which expects that certificate to already exist) can
# start. See DEPLOY.md. Not needed again after the first successful run,
# except if the certbot_certs volume is ever deleted.
#
# This brings up the full base stack (postgres/redis/backend/frontend
# still use the dev Dockerfiles at this point, which is harmless - step 3
# in DEPLOY.md replaces them with the prod build) plus nginx in HTTP-only
# bootstrap mode and a one-off certbot container.
services:
  nginx:
    volumes:
      - ./nginx/prod-bootstrap.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro

  certbot:
    image: certbot/certbot:latest
    container_name: dadamda-certbot-bootstrap
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    networks:
      - dadamda-network

volumes:
  certbot_www:
  certbot_certs:
