# Auto-loaded by plain `docker compose up` (no -f flags) - this is what
# every local dev session in this project has been using. Adds source
# hot-reload bind mounts and the dev nginx config on top of the shared
# docker-compose.yml base.
#
# Explicit `-f` invocations (e.g. `-f docker-compose.yml -f
# docker-compose.prod.yml`, see DEPLOY.md) skip this file automatically,
# which is exactly how the prod stack avoids these dev-only mounts.
services:
  frontend:
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  backend:
    volumes:
      - ./backend:/app

  nginx:
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  frontend_node_modules:
