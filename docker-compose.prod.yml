# Production override for the Ubuntu VM deployment (dadamda.duckdns.org).
# Explicit -f flags mean docker-compose.override.yml (dev-only bind mounts)
# is NOT auto-loaded here - only docker-compose.yml + this file apply.
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# See DEPLOY.md for the full first-time setup (TLS bootstrap included).
services:
  postgres:
    restart: always

  redis:
    restart: always

  backend:
    restart: always
    build:
      context: ./backend
      dockerfile: Dockerfile.prod

  frontend:
    restart: always
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_KAKAO_MAP_KEY: ${NEXT_PUBLIC_KAKAO_MAP_KEY}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
        NEXT_PUBLIC_VERSION: ${NEXT_PUBLIC_VERSION}

  nginx:
    restart: always
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    ports:
      - "443:443"

  certbot:
    image: certbot/certbot:latest
    container_name: dadamda-certbot
    restart: always
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: >-
      /bin/sh -c 'trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot;
        sleep 12h & wait $${!};
      done;'
    networks:
      - dadamda-network

volumes:
  certbot_www:
  certbot_certs:
