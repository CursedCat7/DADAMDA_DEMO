services:
  postgres:
    image: postgres:17
    container_name: dadamda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dadamda-network

  redis:
    image: redis:8
    container_name: dadamda-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dadamda-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dadamda-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_KAKAO_MAP_KEY: ${NEXT_PUBLIC_KAKAO_MAP_KEY}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
      NEXT_PUBLIC_VERSION: ${NEXT_PUBLIC_VERSION}
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - dadamda-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dadamda-backend
    restart: unless-stopped
    environment:
      ENV: ${ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dadamda-network

  nginx:
    image: nginx:1.27-alpine
    container_name: dadamda-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - postgres
      - redis
      - frontend
      - backend
    networks:
      - dadamda-network

volumes:
  postgres_data:
  redis_data:

networks:
  dadamda-network:
    driver: bridge
