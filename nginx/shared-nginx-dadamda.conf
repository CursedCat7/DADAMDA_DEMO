# Copy this file into the OTHER project's nginx/conf.d/ directory
# (the one running `ca_nginx` on `ca_network`), e.g.:
#   cp shared-nginx-dadamda.conf ../<other-project>/nginx/conf.d/dadamda.conf
#
# Requires DaDamDa's backend/frontend containers to be on `ca_network`
# too (docker-compose.shared-nginx.yml handles that) - proxy_pass below
# resolves `dadamda-backend`/`dadamda-frontend` via Docker's internal DNS,
# which only works for containers sharing a network.
#
# Upstream hostnames are resolved at REQUEST time (via `resolver` +
# `set $var` below), not at config-load/reload time. Plain
# `proxy_pass http://dadamda-backend:8000` looks equivalent but isn't -
# nginx resolves that form once when the config loads, so `nginx -s
# reload` fails outright ("host not found in upstream") if DaDamDa's
# containers aren't already up and on this network at that exact
# moment. The `set $var; proxy_pass $var;` form defers resolution to
# each request, so nginx reloads fine any time, and requests just 502
# until DaDamDa's containers are actually up - reload order stops
# mattering.
#
# Bootstrap order (see DEPLOY.md):
#   1. Add this file with ONLY the first (port 80) server block first -
#      the second block references a certificate that doesn't exist yet
#      and will fail nginx's config test.
#   2. Reload the other project's nginx.
#   3. Request the cert (certbot certonly --webroot -d dadamda.duckdns.org
#      using that project's existing certbot service).
#   4. Uncomment/add the second (port 443) server block below.
#   5. Reload nginx again.

server {
    listen 80;
    server_name dadamda.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name dadamda.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/dadamda.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dadamda.duckdns.org/privkey.pem;

    # Docker's embedded DNS server - resolves container names on any
    # network this nginx container is attached to (ca_network included).
    resolver 127.0.0.11 valid=10s;

    location /api/ {
        set $dadamda_backend http://dadamda-backend:8000;
        # NOTE: proxy_pass with a variable does NOT do the normal
        # "replace matched location prefix, append remainder" rewrite -
        # any URI text after the variable is used LITERALLY as the full
        # upstream path, silently dropping the rest of the client's
        # request URI (e.g. "/api/v1/markets" arrives at the backend as
        # just "/api/"). $request_uri preserves the original path+query
        # unchanged instead.
        proxy_pass $dadamda_backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        set $dadamda_frontend http://dadamda-frontend:3000;
        proxy_pass $dadamda_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
